<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/reports" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:1080px; margin:0 auto; padding:44px 44px 72px;">

      <header style="display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:28px;">
        <div>
          <p style="font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--vb-pink); margin:0 0 10px;">Workspace</p>
          <h1 style="font-family:var(--font-display); font-weight:500; font-size:40px; letter-spacing:-1.4px; color:var(--vb-ink); margin:0;">Reports</h1>
          <p style="font-size:15px; color:var(--vb-muted); margin:10px 0 0;">Meeting and task analytics across the org.</p>
        </div>
        <button style="display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 18px; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:12px; font-family:var(--font-sans); font-size:13px; font-weight:600; color:var(--vb-body); cursor:pointer;"><i data-lucide="download" style="width:16px; height:16px;"></i>Export CSV</button>
      </header>

      <!-- KPIs -->
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px;">
        <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:16px; padding:22px;"><div style="font-size:13px; color:var(--vb-muted);">Meetings captured</div><div style="font-family:var(--font-mono); font-size:30px; font-weight:500; color:var(--vb-ink); margin-top:8px;">318</div></div>
        <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:16px; padding:22px;"><div style="font-size:13px; color:var(--vb-muted);">Tasks completed</div><div style="font-family:var(--font-mono); font-size:30px; font-weight:500; color:var(--vb-ink); margin-top:8px;">742</div></div>
        <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:16px; padding:22px;"><div style="font-size:13px; color:var(--vb-muted);">Avg. follow-through</div><div style="font-family:var(--font-mono); font-size:30px; font-weight:500; color:var(--vb-success); margin-top:8px;">81%</div></div>
      </div>

      <!-- Trend chart -->
      <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:20px; padding:26px; margin-bottom:24px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
          <h3 style="font-family:var(--font-display); font-weight:500; font-size:18px; letter-spacing:-0.3px; color:var(--vb-ink); margin:0;">Meetings by week</h3>
          <div style="display:flex; gap:14px;"><span style="display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--vb-muted);"><span style="width:9px; height:9px; border-radius:3px; background:var(--vb-info);"></span>Meetings</span><span style="display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--vb-muted);"><span style="width:9px; height:9px; border-radius:3px; background:var(--vb-pink);"></span>Tasks</span></div>
        </div>
        <div style="display:flex; align-items:flex-end; gap:18px; height:200px;">
          <sc-for list="{{ bars }}" as="b" hint-placeholder-count="8">
            <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:10px; height:100%; justify-content:flex-end;">
              <div style="width:100%; display:flex; gap:4px; align-items:flex-end; height:100%;">
                <div style="flex:1; border-radius:6px 6px 0 0; background:var(--vb-info); height:{{ b.h1 }};"></div>
                <div style="flex:1; border-radius:6px 6px 0 0; background:var(--vb-pink); height:{{ b.h2 }};"></div>
              </div>
              <span style="font-size:11px; color:var(--vb-muted);">{{ b.wk }}</span>
            </div>
          </sc-for>
        </div>
      </div>

      <!-- By category table -->
      <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:20px; padding:26px;">
        <h3 style="font-family:var(--font-display); font-weight:500; font-size:18px; letter-spacing:-0.3px; color:var(--vb-ink); margin:0 0 18px;">By category</h3>
        <div style="display:flex; flex-direction:column; gap:16px;">
          <sc-for list="{{ rows }}" as="r" hint-placeholder-count="4">
            <div style="display:flex; align-items:center; gap:14px;">
              <span style="width:120px; font-size:14px; font-weight:500; color:var(--vb-ink);">{{ r.name }}</span>
              <div style="flex:1; height:10px; border-radius:999px; background:var(--vb-surface-card); overflow:hidden;"><span style="display:block; height:100%; width:{{ r.pct }}; background:{{ r.color }};"></span></div>
              <span style="width:60px; text-align:right; font-family:var(--font-mono); font-size:13px; color:var(--vb-muted);">{{ r.n }}</span>
            </div>
          </sc-for>
        </div>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    const m = [30,42,38,55,48,60,52,44];
    const t = [55,70,62,90,80,95,88,72];
    const wk = ["W1","W2","W3","W4","W5","W6","W7","W8"];
    const max = Math.max(...m, ...t);
    const bars = m.map((v,i) => ({ h1: Math.round(v/max*100)+"%", h2: Math.round(t[i]/max*100)+"%", wk: wk[i] }));
    const rows = [
      { name: "Sales", n: 118, pct: "90%", color: "var(--vb-pink)" },
      { name: "Engineering", n: 96, pct: "74%", color: "var(--vb-info)" },
      { name: "Product", n: 58, pct: "45%", color: "var(--vb-lavender)" },
      { name: "Leadership", n: 46, pct: "35%", color: "var(--vb-ochre)" },
    ];
    return { bars, rows };
  }
}
</script>
</body>
</html>
