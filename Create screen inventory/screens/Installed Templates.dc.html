<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/templates" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:1000px; margin:0 auto; padding:44px 44px 72px;">

      <a href="Templates.dc.html" style="display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:500; color:var(--vb-muted); margin-bottom:14px;"><i data-lucide="chevron-left" style="width:15px; height:15px;"></i>Marketplace</a>
      <header style="display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:28px;">
        <div>
          <h1 style="font-family:var(--font-display); font-weight:500; font-size:36px; letter-spacing:-1.2px; color:var(--vb-ink); margin:0;">Installed templates</h1>
          <p style="font-size:15px; color:var(--vb-muted); margin:8px 0 0;">3 bundles active in this workspace.</p>
        </div>
        <a href="Browse Templates.dc.html" style="display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 18px; background:var(--vb-ink); color:var(--vb-on-ink); border-radius:12px; font-size:14px; font-weight:500;"><i data-lucide="plus" style="width:16px; height:16px;"></i>Add bundle</a>
      </header>

      <div style="display:flex; flex-direction:column; gap:12px;">
        <sc-for list="{{ bundles }}" as="b" hint-placeholder-count="3">
          <div style="display:flex; align-items:center; gap:18px; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:16px; padding:20px 22px;">
            <span style="width:48px; height:48px; border-radius:13px; flex-shrink:0; background:{{ b.chipBg }}; display:inline-flex; align-items:center; justify-content:center;"><i data-lucide="{{ b.icon }}" style="width:22px; height:22px; color:{{ b.color }};"></i></span>
            <div style="flex:1; min-width:0;">
              <div style="display:flex; align-items:center; gap:10px;"><h3 style="font-family:var(--font-display); font-weight:500; font-size:17px; color:var(--vb-ink); margin:0;">{{ b.name }}</h3><span style="font-family:var(--font-mono); font-size:11px; color:var(--vb-muted); background:var(--vb-surface-card); padding:2px 8px; border-radius:6px;">{{ b.version }}</span></div>
              <p style="font-size:13px; color:var(--vb-muted); margin:4px 0 0;">Installed {{ b.installed }} · {{ b.items }} items</p>
            </div>
            <sc-if value="{{ b.update }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--vb-info); background:color-mix(in srgb, var(--vb-info) 12%, white); padding:6px 12px; border-radius:999px;"><i data-lucide="arrow-up-circle" style="width:13px; height:13px;"></i>Update available</span></sc-if>
            <button style="width:38px; height:38px; border-radius:11px; border:1px solid var(--vb-hairline); background:transparent; color:var(--vb-muted-soft); cursor:pointer; display:inline-flex; align-items:center; justify-content:center;"><i data-lucide="more-horizontal" style="width:18px; height:18px;"></i></button>
          </div>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:640}}">
class Component extends DCLogic {
  renderVals() {
    const mix = (v) => `color-mix(in srgb, ${v} 12%, white)`;
    const raw = [
      { name: "Sales starter", icon: "briefcase", color: "var(--vb-pink)", version: "v2.1.0", installed: "Jun 12", items: 9, update: true },
      { name: "Eng standups", icon: "code", color: "var(--vb-info)", version: "v1.4.2", installed: "May 30", items: 7, update: false },
      { name: "Board & staff", icon: "rocket", color: "var(--vb-ochre)", version: "v1.0.1", installed: "Jun 28", items: 5, update: false },
    ];
    return { bundles: raw.map(b => ({ ...b, chipBg: mix(b.color) })) };
  }
}
</script>
</body>
</html>
