<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/settings" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:860px; margin:0 auto; padding:44px 44px 72px;">

      <header style="margin-bottom:32px;">
        <p style="font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--vb-pink); margin:0 0 10px;">Workspace</p>
        <h1 style="font-family:var(--font-display); font-weight:500; font-size:40px; letter-spacing:-1.4px; color:var(--vb-ink); margin:0;">Settings</h1>
      </header>

      <div style="display:flex; gap:24px; margin-bottom:28px; border-bottom:1px solid var(--vb-hairline);">
        <span style="padding:10px 2px; font-size:14px; font-weight:600; color:var(--vb-ink); border-bottom:2px solid var(--vb-ink);">General</span>
        <span style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Notifications</span>
        <span style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Billing</span>
        <span style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Security</span>
      </div>

      <!-- Profile -->
      <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:18px; padding:26px; margin-bottom:18px;">
        <h3 style="font-family:var(--font-display); font-weight:500; font-size:18px; letter-spacing:-0.3px; color:var(--vb-ink); margin:0 0 20px;">Profile</h3>
        <div style="display:flex; align-items:center; gap:18px; margin-bottom:22px;">
          <span style="width:64px; height:64px; border-radius:18px; background:var(--vb-pink); display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:600; font-size:24px; color:#fff;">DC</span>
          <button style="height:38px; padding:0 16px; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:12px; font-family:var(--font-sans); font-size:13px; font-weight:600; color:var(--vb-body); cursor:pointer;">Change photo</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div style="display:flex; flex-direction:column; gap:7px;"><label style="font-size:12px; font-weight:500; color:var(--vb-body-strong);">Full name</label><input value="Dana Cho" style="height:44px; box-sizing:border-box; padding:0 14px; font-family:var(--font-sans); font-size:14px; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:12px; color:var(--vb-ink); outline:none;" /></div>
          <div style="display:flex; flex-direction:column; gap:7px;"><label style="font-size:12px; font-weight:500; color:var(--vb-body-strong);">Email</label><input value="dana@acme.com" style="height:44px; box-sizing:border-box; padding:0 14px; font-family:var(--font-sans); font-size:14px; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:12px; color:var(--vb-ink); outline:none;" /></div>
        </div>
      </div>

      <!-- Workspace -->
      <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:18px; padding:26px; margin-bottom:18px;">
        <h3 style="font-family:var(--font-display); font-weight:500; font-size:18px; letter-spacing:-0.3px; color:var(--vb-ink); margin:0 0 20px;">Workspace</h3>
        <div style="display:flex; flex-direction:column; gap:2px;">
          <sc-for list="{{ toggles }}" as="t" hint-placeholder-count="3">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--vb-hairline-soft);">
              <div><div style="font-size:14px; font-weight:500; color:var(--vb-ink);">{{ t.title }}</div><div style="font-size:12px; color:var(--vb-muted); margin-top:3px;">{{ t.desc }}</div></div>
              <span style="width:44px; height:26px; border-radius:999px; flex-shrink:0; position:relative; background:{{ t.track }};"><span style="position:absolute; top:3px; {{ t.knobSide }}:3px; width:20px; height:20px; border-radius:50%; background:#fff;"></span></span>
            </div>
          </sc-for>
        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button style="height:44px; padding:0 20px; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:12px; font-family:var(--font-sans); font-size:14px; font-weight:600; color:var(--vb-body); cursor:pointer;">Cancel</button>
        <button style="height:44px; padding:0 22px; background:var(--vb-ink); color:var(--vb-on-ink); border:none; border-radius:12px; font-family:var(--font-sans); font-size:14px; font-weight:500; cursor:pointer;">Save changes</button>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    const raw = [
      { title: "Auto-join scheduled meetings", desc: "Send the bot to calendar events automatically.", on: true },
      { title: "Live transcription", desc: "Stream the transcript to the browser during calls.", on: true },
      { title: "Weekly digest email", desc: "A Monday summary of meetings and open tasks.", on: false },
    ];
    return { toggles: raw.map(t => ({ ...t,
      track: t.on ? "var(--vb-ink)" : "var(--vb-hairline)",
      knobSide: t.on ? "right" : "left" })) };
  }
}
</script>
</body>
</html>
