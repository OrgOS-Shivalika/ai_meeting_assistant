<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/boards" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:1100px; margin:0 auto; padding:44px 44px 72px;">

      <header style="display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap; margin-bottom:32px;">
        <div>
          <p style="font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--vb-pink); margin:0 0 10px;">Overview</p>
          <h1 style="font-family:var(--font-display); font-weight:500; font-size:40px; letter-spacing:-1.4px; color:var(--vb-ink); margin:0;">Boards</h1>
          <p style="font-size:15px; color:var(--vb-muted); margin:10px 0 0;">Track meeting outcomes as work moves across your team.</p>
        </div>
        <button style="display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 18px; background:var(--vb-ink); color:var(--vb-on-ink); border:none; border-radius:12px; font-family:var(--font-sans); font-size:14px; font-weight:500; cursor:pointer;"><i data-lucide="plus" style="width:16px; height:16px;"></i>New board</button>
      </header>

      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:18px;">
        <sc-for list="{{ boards }}" as="b" hint-placeholder-count="5">
          <a href="Board.dc.html" style="display:block; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:20px; padding:24px;">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
              <span style="width:40px; height:40px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; background:{{ b.chipBg }};"><i data-lucide="layout-grid" style="width:18px; height:18px; color:{{ b.color }};"></i></span>
              <div><h3 style="font-family:var(--font-display); font-weight:500; font-size:18px; letter-spacing:-0.3px; color:var(--vb-ink); margin:0;">{{ b.name }}</h3><p style="font-size:12px; color:var(--vb-muted); margin:2px 0 0;">{{ b.updated }}</p></div>
            </div>
            <!-- progress -->
            <div style="height:8px; border-radius:999px; background:var(--vb-surface-card); overflow:hidden; margin-bottom:12px; display:flex;">
              <span style="width:{{ b.donePct }}; background:var(--vb-success);"></span>
              <span style="width:{{ b.progPct }}; background:var(--vb-info);"></span>
            </div>
            <div style="display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--vb-muted);">
              <span>{{ b.count }} cards</span>
              <div style="display:flex; align-items:center; gap:12px;">
                <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:7px; height:7px; border-radius:50%; background:var(--vb-success);"></span>{{ b.done }} done</span>
                <span style="display:inline-flex; align-items:center; gap:5px;"><span style="width:7px; height:7px; border-radius:50%; background:var(--vb-info);"></span>{{ b.prog }} active</span>
              </div>
            </div>
          </a>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:760}}">
class Component extends DCLogic {
  renderVals() {
    const mix = (v) => `color-mix(in srgb, ${v} 12%, white)`;
    const raw = [
      { name: "Q3 Platform", color: "var(--vb-info)", updated: "Updated 2h ago", count: 24, done: 11, prog: 8 },
      { name: "Sales pipeline", color: "var(--vb-pink)", updated: "Updated yesterday", count: 31, done: 14, prog: 10 },
      { name: "Product launch", color: "var(--vb-lavender)", updated: "Updated 3d ago", count: 18, done: 6, prog: 7 },
      { name: "Hiring — eng", color: "var(--vb-ochre)", updated: "Updated 1w ago", count: 12, done: 5, prog: 3 },
      { name: "Customer escalations", color: "var(--vb-coral)", updated: "Updated 5h ago", count: 9, done: 4, prog: 4 },
    ];
    return { boards: raw.map(b => ({ ...b, chipBg: mix(b.color),
      donePct: Math.round(b.done/b.count*100)+"%", progPct: Math.round(b.prog/b.count*100)+"%" })) };
  }
}
</script>
</body>
</html>
