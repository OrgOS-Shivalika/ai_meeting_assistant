<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/agent-control" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:1100px; margin:0 auto; padding:44px 44px 72px;">

      <header style="display:flex; align-items:flex-end; justify-content:space-between; gap:24px; margin-bottom:24px;">
        <div>
          <p style="font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--vb-pink); margin:0 0 10px;">Intelligence</p>
          <h1 style="font-family:var(--font-display); font-weight:500; font-size:40px; letter-spacing:-1.4px; color:var(--vb-ink); margin:0;">Agents</h1>
        </div>
        <button style="display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 18px; background:var(--vb-ink); color:var(--vb-on-ink); border:none; border-radius:12px; font-family:var(--font-sans); font-size:14px; font-weight:500; cursor:pointer;"><i data-lucide="plus" style="width:16px; height:16px;"></i>New profile</button>
      </header>
      <div style="display:flex; gap:24px; margin-bottom:28px; border-bottom:1px solid var(--vb-hairline);">
        <a href="Agents.dc.html" style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Overview</a>
        <a href="Harness Runs.dc.html" style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Runs</a>
        <a href="Harness Metrics.dc.html" style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Metrics</a>
        <span style="padding:10px 2px; font-size:14px; font-weight:600; color:var(--vb-ink); border-bottom:2px solid var(--vb-ink);">Profiles</span>
      </div>

      <div style="display:flex; flex-direction:column; gap:12px;">
        <sc-for list="{{ profiles }}" as="p" hint-placeholder-count="4">
          <a href="Agent Detail.dc.html" style="display:flex; align-items:center; gap:18px; background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:16px; padding:18px 22px;">
            <span style="width:44px; height:44px; border-radius:13px; flex-shrink:0; background:{{ p.chipBg }}; display:inline-flex; align-items:center; justify-content:center;"><i data-lucide="{{ p.icon }}" style="width:20px; height:20px; color:{{ p.color }};"></i></span>
            <div style="flex:1; min-width:0;">
              <div style="display:flex; align-items:center; gap:10px;"><h3 style="font-family:var(--font-display); font-weight:500; font-size:17px; color:var(--vb-ink); margin:0;">{{ p.name }}</h3><span style="font-family:var(--font-mono); font-size:11px; color:var(--vb-muted); background:var(--vb-surface-card); padding:2px 8px; border-radius:6px;">{{ p.version }}</span></div>
              <p style="font-size:13px; color:var(--vb-muted); margin:4px 0 0;">{{ p.desc }}</p>
            </div>
            <span style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:{{ p.stColor }};"><span style="width:6px; height:6px; border-radius:50%; background:{{ p.stColor }};"></span>{{ p.status }}</span>
            <i data-lucide="chevron-right" style="width:18px; height:18px; color:var(--vb-muted-soft);"></i>
          </a>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:700}}">
class Component extends DCLogic {
  renderVals() {
    const mix = (v) => `color-mix(in srgb, ${v} 12%, white)`;
    const raw = [
      { name: "Summarizer", icon: "file-text", color: "var(--vb-info)", version: "v12", desc: "GPT-4o-mini · concise summary, decisions, risks", status: "Active", ok: true },
      { name: "Task router", icon: "check-square", color: "var(--vb-pink)", version: "v8", desc: "GPT-4o-mini · owner + due-date extraction", status: "Active", ok: true },
      { name: "Graph extractor", icon: "network", color: "var(--vb-lavender)", version: "v5", desc: "GPT-4o · entity & relationship extraction", status: "Active", ok: true },
      { name: "Closing briefing", icon: "clipboard-list", color: "var(--vb-ochre)", version: "v2", desc: "GPT-4o-mini · end-of-day rollup", status: "Draft", ok: false },
    ];
    return { profiles: raw.map(p => ({ ...p, chipBg: mix(p.color),
      stColor: p.ok ? "var(--vb-success)" : "var(--vb-muted-soft)" })) };
  }
}
</script>
</body>
</html>
