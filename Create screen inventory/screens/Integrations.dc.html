<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/integrations" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:1000px; margin:0 auto; padding:44px 44px 72px;">

      <header style="margin-bottom:32px;">
        <p style="font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--vb-pink); margin:0 0 10px;">Workspace</p>
        <h1 style="font-family:var(--font-display); font-weight:500; font-size:40px; letter-spacing:-1.4px; color:var(--vb-ink); margin:0;">Integrations</h1>
        <p style="font-size:15px; color:var(--vb-muted); margin:10px 0 0;">Connect the tools your meetings already live in.</p>
      </header>

      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:16px;">
        <sc-for list="{{ apps }}" as="a" hint-placeholder-count="6">
          <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:18px; padding:22px;">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px;">
              <span style="width:46px; height:46px; border-radius:13px; background:{{ a.chipBg }}; display:inline-flex; align-items:center; justify-content:center;"><i data-lucide="{{ a.icon }}" style="width:22px; height:22px; color:{{ a.color }};"></i></span>
              <sc-if value="{{ a.connected }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--vb-success);"><span style="width:6px; height:6px; border-radius:50%; background:var(--vb-success);"></span>Connected</span></sc-if>
            </div>
            <h3 style="font-family:var(--font-display); font-weight:500; font-size:17px; color:var(--vb-ink); margin:0 0 5px;">{{ a.name }}</h3>
            <p style="font-size:13px; line-height:1.5; color:var(--vb-muted); margin:0 0 18px; min-height:38px;">{{ a.desc }}</p>
            <button style="{{ a.btnStyle }}">{{ a.btnLabel }}</button>
          </div>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:760}}">
class Component extends DCLogic {
  renderVals() {
    const mix = (v) => `color-mix(in srgb, ${v} 12%, white)`;
    const connBtn = "width:100%; height:40px; border-radius:12px; border:1px solid var(--vb-hairline); background:transparent; color:var(--vb-body); font-family:var(--font-sans); font-size:13px; font-weight:600; cursor:pointer;";
    const addBtn = "width:100%; height:40px; border-radius:12px; border:none; background:var(--vb-ink); color:var(--vb-on-ink); font-family:var(--font-sans); font-size:13px; font-weight:500; cursor:pointer;";
    const raw = [
      { name: "Google Calendar", icon: "calendar", color: "var(--vb-info)", desc: "Sync events and auto-join meetings with the bot.", connected: true },
      { name: "Google Meet", icon: "video", color: "var(--vb-success)", desc: "Record and transcribe Meet calls automatically.", connected: true },
      { name: "Zoom", icon: "video", color: "var(--vb-info)", desc: "Bring the bot into Zoom meetings by URL.", connected: false },
      { name: "Microsoft Teams", icon: "users", color: "var(--vb-lavender)", desc: "Join and transcribe Teams calls.", connected: false },
      { name: "Slack", icon: "hash", color: "var(--vb-pink)", desc: "Post summaries and tasks to channels.", connected: false },
      { name: "Webex", icon: "video", color: "var(--vb-ochre)", desc: "Capture Webex meetings end to end.", connected: false },
    ];
    return { apps: raw.map(a => ({ ...a, chipBg: mix(a.color),
      btnStyle: a.connected ? connBtn : addBtn, btnLabel: a.connected ? "Manage" : "Connect" })) };
  }
}
</script>
</body>
</html>
