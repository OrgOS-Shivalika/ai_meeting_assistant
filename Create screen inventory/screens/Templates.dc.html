<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/templates" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:1100px; margin:0 auto; padding:44px 44px 72px;">

      <!-- Hero -->
      <div style="background:var(--vb-lavender); border-radius:28px; padding:44px; margin-bottom:20px; position:relative; overflow:hidden;">
        <div style="position:absolute; top:-40px; right:-20px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,0.25);"></div>
        <div style="position:relative; max-width:560px;">
          <p style="font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--vb-ink); opacity:0.7; margin:0 0 14px;">Template marketplace</p>
          <h1 style="font-family:var(--font-display); font-weight:500; font-size:40px; line-height:1.05; letter-spacing:-1.6px; color:var(--vb-ink); margin:0 0 14px;">Bootstrap your workspace in an afternoon.</h1>
          <p style="font-size:15px; line-height:1.6; color:var(--vb-ink); opacity:0.8; margin:0 0 24px;">Install ready-made agent bundles — categories, prompt configs and boards — tuned for how your team meets.</p>
          <div style="display:flex; gap:12px;">
            <a href="Browse Templates.dc.html" style="display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 20px; background:var(--vb-ink); color:var(--vb-on-ink); border-radius:12px; font-size:14px; font-weight:500;">Browse templates<i data-lucide="arrow-right" style="width:16px; height:16px;"></i></a>
            <a href="Installed Templates.dc.html" style="display:inline-flex; align-items:center; height:44px; padding:0 20px; background:rgba(255,255,255,0.6); color:var(--vb-ink); border-radius:12px; font-size:14px; font-weight:600;">Installed</a>
          </div>
        </div>
      </div>

      <!-- Featured categories -->
      <h2 style="font-family:var(--font-display); font-weight:500; font-size:22px; letter-spacing:-0.5px; color:var(--vb-ink); margin:28px 0 16px;">Browse by use case</h2>
      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:16px;">
        <sc-for list="{{ cats }}" as="c" hint-placeholder-count="4">
          <a href="Browse Templates.dc.html" style="display:block; background:{{ c.bg }}; color:{{ c.fg }}; border-radius:20px; padding:24px;">
            <span style="width:40px; height:40px; border-radius:12px; background:{{ c.chip }}; display:inline-flex; align-items:center; justify-content:center; margin-bottom:16px;"><i data-lucide="{{ c.icon }}" style="width:19px; height:19px;"></i></span>
            <h3 style="font-family:var(--font-display); font-weight:500; font-size:18px; margin:0 0 6px;">{{ c.name }}</h3>
            <p style="font-size:13px; opacity:0.85; margin:0;">{{ c.count }} bundles</p>
          </a>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:760}}">
class Component extends DCLogic {
  renderVals() {
    return { cats: [
      { name: "Sales teams", icon: "briefcase", count: 8, bg: "var(--vb-pink)", fg: "#fff", chip: "rgba(255,255,255,0.2)" },
      { name: "Engineering", icon: "code", count: 6, bg: "var(--vb-info)", fg: "#fff", chip: "rgba(255,255,255,0.2)" },
      { name: "Leadership", icon: "rocket", count: 4, bg: "var(--vb-peach)", fg: "var(--vb-ink)", chip: "rgba(0,0,0,0.08)" },
      { name: "Customer success", icon: "heart-handshake", count: 5, bg: "var(--vb-ochre)", fg: "var(--vb-ink)", chip: "rgba(0,0,0,0.08)" },
    ] };
  }
}
</script>
</body>
</html>
