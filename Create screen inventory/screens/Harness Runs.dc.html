<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/fonts.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/colors.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/typography.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/spacing.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/tokens/radius.css">
  <link rel="stylesheet" href="../_ds/vibrant-design-system-7e2fbe7d-3978-4dfe-a49d-35f89fe9d5a2/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (function(){function i(){if(window.lucide){try{lucide.createIcons();}catch(e){}}}
    var t;new MutationObserver(function(){clearTimeout(t);t=setTimeout(i,60);}).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded',i);setTimeout(i,120);setTimeout(i,500);})();
  </script>
  <style>body{margin:0;} a{text-decoration:none;color:inherit;}</style>
</helmet>
<div style="display:flex; height:100vh; background:var(--vb-canvas); font-family:var(--font-sans); color:var(--vb-body);">
  <dc-import name="Sidebar" active="/agent-control" hint-size="248px,100%"></dc-import>
  <div style="flex:1; overflow-y:auto;">
    <div style="max-width:1100px; margin:0 auto; padding:44px 44px 72px;">

      <header style="margin-bottom:24px;">
        <p style="font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--vb-pink); margin:0 0 10px;">Intelligence</p>
        <h1 style="font-family:var(--font-display); font-weight:500; font-size:40px; letter-spacing:-1.4px; color:var(--vb-ink); margin:0;">Agents</h1>
      </header>
      <div style="display:flex; gap:24px; margin-bottom:28px; border-bottom:1px solid var(--vb-hairline);">
        <a href="Agents.dc.html" style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Overview</a>
        <span style="padding:10px 2px; font-size:14px; font-weight:600; color:var(--vb-ink); border-bottom:2px solid var(--vb-ink);">Runs</span>
        <a href="Harness Metrics.dc.html" style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Metrics</a>
        <a href="Agent Profiles.dc.html" style="padding:10px 2px; font-size:14px; font-weight:500; color:var(--vb-muted);">Profiles</a>
      </div>

      <!-- Runs table -->
      <div style="background:var(--vb-canvas); border:1px solid var(--vb-hairline); border-radius:16px; overflow:hidden;">
        <div style="display:grid; grid-template-columns:120px 1.4fr 1fr 90px 90px 110px; gap:16px; padding:14px 22px; border-bottom:1px solid var(--vb-hairline); background:var(--vb-surface-soft);">
          <span style="font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--vb-muted-soft);">Status</span>
          <span style="font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--vb-muted-soft);">Run</span>
          <span style="font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--vb-muted-soft);">Agent</span>
          <span style="font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--vb-muted-soft);">Latency</span>
          <span style="font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--vb-muted-soft);">Tokens</span>
          <span style="font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--vb-muted-soft); text-align:right;">Started</span>
        </div>
        <sc-for list="{{ runs }}" as="r" hint-placeholder-count="8">
          <div style="display:grid; grid-template-columns:120px 1.4fr 1fr 90px 90px 110px; gap:16px; padding:15px 22px; border-bottom:1px solid var(--vb-hairline-soft); align-items:center;">
            <span style="display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:{{ r.stColor }};"><span style="width:6px; height:6px; border-radius:50%; background:{{ r.stColor }};"></span>{{ r.status }}</span>
            <span style="font-family:var(--font-mono); font-size:12.5px; color:var(--vb-ink);">{{ r.id }}</span>
            <span style="font-size:13px; color:var(--vb-body);">{{ r.agent }}</span>
            <span style="font-family:var(--font-mono); font-size:12px; color:var(--vb-muted);">{{ r.latency }}</span>
            <span style="font-family:var(--font-mono); font-size:12px; color:var(--vb-muted);">{{ r.tokens }}</span>
            <span style="font-size:12px; color:var(--vb-muted); text-align:right;">{{ r.started }}</span>
          </div>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:760}}">
class Component extends DCLogic {
  renderVals() {
    const ST = { ok: ["Success","var(--vb-success)"], run: ["Running","var(--vb-info)"], err: ["Failed","var(--vb-error)"] };
    const raw = [
      ["ok","run_8f3a21","Summarizer","1.6s","4,210","4 min ago"],
      ["run","run_8f3a1e","Task router","—","2,880","6 min ago"],
      ["ok","run_8f39c7","Graph extractor","2.1s","6,540","12 min ago"],
      ["ok","run_8f39a2","Summarizer","1.4s","3,990","24 min ago"],
      ["err","run_8f3980","Task router","0.9s","1,120","31 min ago"],
      ["ok","run_8f3955","Graph extractor","2.4s","7,010","48 min ago"],
      ["ok","run_8f3921","Summarizer","1.7s","4,330","1h ago"],
      ["ok","run_8f38f0","Task router","1.2s","2,560","1h ago"],
    ];
    const runs = raw.map(r => ({ status: ST[r[0]][0], stColor: ST[r[0]][1], id: r[1], agent: r[2], latency: r[3], tokens: r[4], started: r[5] }));
    return { runs };
  }
}
</script>
</body>
</html>
